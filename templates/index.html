<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Record System</title>

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="container">

    <div class="header">

        <h1>🎓 Student Record System</h1>

    

    </div>

    <div class="card">

        <h2>Add / Update Student</h2>

        <input type="hidden" id="studentId">

        <div class="form-grid">

            <input
                type="text"
                id="roll"
                placeholder="Roll Number"
                required>

            <input
                type="text"
                id="name"
                placeholder="Student Name"
                required>

            <input
                type="number"
                id="age"
                placeholder="Age"
                required>

            <input
                type="text"
                id="course"
                placeholder="Course"
                required>

        </div>

        <div class="button-group">

            <button
                class="primary-btn"
                onclick="saveStudent()">

                <span id="buttonText">
                    Save Student
                </span>

            </button>

            <button
                class="clear-btn"
                onclick="clearForm()">

                Clear

            </button>

        </div>

        <p id="message"></p>

    </div>

    <div class="card">

        <h2>Search Student</h2>

        <input
            type="text"
            id="search"
            placeholder="Search by Roll Number, Name or Course"
            onkeyup="searchStudent()">

    </div>

    <div class="card">

        <h2>Student List</h2>

        <table>

            <thead>

                <tr>

                    <th>Roll</th>

                    <th>Name</th>

                    <th>Age</th>

                    <th>Course</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="studentTable">

                <tr>

                    <td colspan="5">

                        No Students Found

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>
let editingId = null;
let messageTimeout = null;

window.onload = function () {
    loadStudents();
};

function showMessage(text, isError) {

    const messageEl = document.getElementById("message");

    messageEl.textContent = text;
    messageEl.style.color = isError ? "#dc2626" : "#16a34a";

    clearTimeout(messageTimeout);

    messageTimeout = setTimeout(() => {
        messageEl.textContent = "";
    }, 3000);

}

function renderStudents(students) {

    const table = document.getElementById("studentTable");

    table.innerHTML = "";

    if (students.length === 0) {

        table.innerHTML = `
            <tr>
                <td colspan="5">No Students Found</td>
            </tr>
        `;

        return;
    }

    students.forEach(student => {

        table.innerHTML += `
        <tr>

            <td>${student.roll}</td>
            <td>${student.name}</td>
            <td>${student.age}</td>
            <td>${student.course}</td>

            <td id="actions-${student.id}">

                <button class="edit-btn"
                onclick="editStudent(${student.id})">
                Edit
                </button>

                <button class="delete-btn"
                onclick="deleteStudent(${student.id})">
                Delete
                </button>

            </td>

        </tr>
        `;

    });

}

function loadStudents() {

    fetch("/api/students")

    .then(response => response.json())

    .then(data => {

        if(data.success){

            renderStudents(data.students);

        }

    })

    .catch(() => {

        showMessage("Cannot connect to server.", true);

    });

}

function saveStudent() {

    const student = {

        roll: document.getElementById("roll").value.trim(),
        name: document.getElementById("name").value.trim(),
        age: document.getElementById("age").value,
        course: document.getElementById("course").value.trim()

    };

    if(
        student.roll==="" ||
        student.name==="" ||
        student.age==="" ||
        student.course===""){

        showMessage("Please fill all fields.", true);

        return;
    }

    const url = editingId === null
        ? "/api/students"
        : "/api/student/" + editingId;

    const method = editingId === null
        ? "POST"
        : "PUT";

    fetch(url,{

        method:method,

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(student)

    })

    .then(response=>response.json())

    .then(result=>{

        showMessage(result.message, !result.success);

        if(result.success){

            clearForm();

            loadStudents();

        }

    })

    .catch(()=>{

        showMessage("Server Error", true);

    });

}

function editStudent(id){

    fetch("/api/student/"+id)

    .then(response=>response.json())

    .then(result=>{

        if(!result.success){

            showMessage(result.message, true);

            return;

        }

        const student=result.student;

        editingId=student.id;

        document.getElementById("roll").value=student.roll;
        document.getElementById("name").value=student.name;
        document.getElementById("age").value=student.age;
        document.getElementById("course").value=student.course;

        document.getElementById("buttonText").innerText="Update Student";

        window.scrollTo({
            top:0,
            behavior:"smooth"
        });

    });

}

function deleteStudent(id){

    const cell = document.getElementById("actions-"+id);

    cell.innerHTML = `
        Delete this student?
        <button class="delete-btn" onclick="confirmDelete(${id})">Confirm</button>
        <button class="clear-btn" onclick="loadStudents()">Cancel</button>
    `;

}

function confirmDelete(id){

    fetch("/api/student/"+id,{

        method:"DELETE"

    })

    .then(response=>response.json())

    .then(result=>{

        showMessage(result.message, !result.success);

        loadStudents();

    });

}

function searchStudent(){

    const keyword=document.getElementById("search").value.trim();

    if(keyword===""){

        loadStudents();

        return;

    }

    fetch("/api/search?q="+encodeURIComponent(keyword))

    .then(response=>response.json())

    .then(data=>{

        if(data.success){

            renderStudents(data.students);

        }

    });

}

function clearForm(){

    editingId=null;

    document.getElementById("roll").value="";
    document.getElementById("name").value="";
    document.getElementById("age").value="";
    document.getElementById("course").value="";

    document.getElementById("buttonText").innerText="Save Student";

}
</script>

</body>

</html>
